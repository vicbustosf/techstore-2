server:
  port: 8080
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: techstore-api
          uri: http://techstore-api:8083
          
          predicates:
            - Path=/api/**
      globalcors:
        corsConfigurations:
          '[/**]':

            allowedOrigins:
              - "http://localhost:5500"
              - "http://127.0.0.1:5500"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
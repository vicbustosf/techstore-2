version: "3.8"
 
services:
  postgres:
    image: postgres:15
    container_name: techstore_db_compose
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    networks:
      - techstore_network
 
  techstore-api:
    build:
      context: ./techstore-api
      dockerfile: Dockerfile
    container_name: techstore_api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/techstore
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - postgres
    networks:
      - techstore_network
 
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "8080:8080"
    depends_on:
      - techstore-api
    networks:
      - techstore_network
 
networks:
  techstore_network: